<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Motor Wars 2 Original | Players</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    th { cursor: pointer; }

    th[data-sort]::after {
      content: ' ⇅';
      font-size: 0.7em;
      color: #999;
      margin-left: 4px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      color: #e5e7eb;
    }

    .modal-content {
      background: linear-gradient(#14240e, #0f1f0b);
      margin: 10% auto;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      position: relative;
    }

    .close {
      position: absolute;
      right: 15px;
      top: 10px;
      color: #84cc16;
      font-size: 24px;
      cursor: pointer;
    }

    tbody tr { cursor: pointer; }
  </style>
</head>
<body>

<div class="container">
  <aside class="sidebar">
    <h2>Motor Wars 2 Original</h2>

    <div class="category">
      <h3>Search & Analyze</h3>
      <button class="side-btn active" id="btnPlayers">Players</button>
      <button class="side-btn sub" id="btnActivePlayers">Active Players</button>
      <button class="side-btn" id="btnClans">Clans</button>
    </div>
  </aside>

  <main class="main">
    <div class="top-bar">
      <input type="text" id="searchInput" placeholder="Search..." />
      <button id="btnSearch">Search</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- PLAYER MODAL -->
<div id="playerModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('playerModal')">&times;</span>
    <h3 id="p_name"></h3>
    <p>ID: <span id="p_id"></span></p>
    <p>Country: <span id="p_country"></span></p>
    <p>Level: <span id="p_level"></span></p>
    <p>XP: <span id="p_xp"></span></p>
    <p>Clan: <span id="p_clan"></span></p>
    <p>Role: <span id="p_role"></span></p>
    <p>Last Login: <span id="p_last"></span></p>
  </div>
</div>

<!-- CLAN MODAL -->
<div id="clanModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('clanModal')">&times;</span>
    <h3 id="c_name"></h3>
    <p>ID: <span id="c_id"></span></p>
    <p>Tag: <span id="c_tag"></span></p>
    <p>Level: <span id="c_level"></span></p>
    <p>XP: <span id="c_xp"></span></p>
    <p>Plays: <span id="c_plays"></span></p>
    <p>Last Active: <span id="c_last"></span></p>
    <p>Last Online: <span id="c_online"></span></p>
    <p>Description: <span id="c_desc"></span></p>
    <p>Leader: <span id="c_leader"></span></p>
  </div>
</div>

<script>
const PLAYERS_API = 'https://raw.githubusercontent.com/CleverDude1/Motor-Wars-2-Old-Portal/main/players.json';
const CLANS_API = 'https://mw2-proxy-clans.vercel.app/api/clans';

let mode = 'players';
let data = [];
let sortField = 'xp';
let sortAsc = false;
let showActive = false;
let search = '';

document.getElementById('btnPlayers').onclick = ()=>switchMode('players');
document.getElementById('btnClans').onclick = ()=>switchMode('clans');
document.getElementById('btnActivePlayers').onclick = ()=>{
  showActive = !showActive;
  render();
};
document.getElementById('btnSearch').onclick = ()=>{
  search = document.getElementById('searchInput').value.toLowerCase();
  render();
};

function switchMode(m){
  mode = m;
  document.querySelectorAll('.side-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(m==='players'?'btnPlayers':'btnClans').classList.add('active');
  load();
}

async function load(){
  const url = mode==='players'?PLAYERS_API:CLANS_API;
  const res = await fetch(url);
  data = await res.json();
  render();
}

function xpToLevel(xp){
  return Math.max(1, Math.floor(Math.sqrt(xp/2500)));
}

function render(){
  let filtered = [...data];

  if(mode==='players'){
    filtered = filtered.map(p=>{
      const u = p.current||{};
      return {
        id: u.id,
        name: u.nickname||'Unknown',
        country: u.country,
        xp: Number(u.xp)||0,
        level: xpToLevel(u.xp||0),
        clan: (u.nickname||'').match(/\((.*?)\)/)?.[1]||'-',
        last: u.lastLogin
      };
    });

    if(showActive){
      const cutoff = Date.now()-30*86400000;
      filtered = filtered.filter(p=>new Date(p.last)>=cutoff);
    }

    if(search){
      filtered = filtered.filter(p=>p.name.toLowerCase().includes(search));
    }

    document.getElementById('tableHead').innerHTML=`
      <tr>
        <th data-sort="name">Name</th>
        <th data-sort="xp">XP</th>
        <th data-sort="level">Level</th>
        <th data-sort="clan">Clan</th>
      </tr>
    `;

  } else {
    filtered = filtered.map(c=>({
      id: c.id,
      tag: c.clanTag,
      name: c.clanName||'-',
      xp: Number(c.honor)||0,
      level: c.level,
      plays: c.plays,
      last: c.lastActive,
      desc: c.clanDescription||''
    }));

    if(search){
      filtered = filtered.filter(c=>c.tag.toLowerCase().includes(search));
    }

    document.getElementById('tableHead').innerHTML=`
      <tr>
        <th data-sort="tag">Tag</th>
        <th data-sort="name">Name</th>
        <th data-sort="xp">XP</th>
        <th data-sort="plays">Plays</th>
      </tr>
    `;
  }

  filtered.sort((a,b)=>{
    let A=a[sortField], B=b[sortField];
    if(typeof A==='string') return sortAsc?A.localeCompare(B):B.localeCompare(A);
    return sortAsc?A-B:B-A;
  });

  const body = document.getElementById('tableBody');
  body.innerHTML='';

  filtered.forEach(item=>{
    const tr=document.createElement('tr');

    if(mode==='players'){
      tr.innerHTML=`
        <td>${item.name}</td>
        <td>${item.xp}</td>
        <td>${item.level}</td>
        <td>${item.clan}</td>
      `;
      tr.onclick=()=>openPlayer(item);
    } else {
      tr.innerHTML=`
        <td>${item.tag}</td>
        <td>${item.name}</td>
        <td>${item.xp}</td>
        <td>${item.plays}</td>
      `;
      tr.onclick=()=>openClan(item);
    }

    body.appendChild(tr);
  });

  document.querySelectorAll('th').forEach(th=>{
    th.onclick=()=>{
      const f=th.dataset.sort;
      if(sortField===f) sortAsc=!sortAsc;
      else { sortField=f; sortAsc=false; }
      render();
    };
  });
}

function openPlayer(p){
  document.getElementById('p_name').textContent=p.name;
  document.getElementById('p_id').textContent=p.id;
  document.getElementById('p_country').textContent=p.country;
  document.getElementById('p_level').textContent=p.level;
  document.getElementById('p_xp').textContent=p.xp;
  document.getElementById('p_clan').textContent=p.clan;
  document.getElementById('p_role').textContent='';
  document.getElementById('p_last').textContent=p.last;
  document.getElementById('playerModal').style.display='block';
}

function openClan(c){
  const diff=Math.floor((Date.now()-new Date(c.last))/(86400000));
  document.getElementById('c_name').textContent=c.name;
  document.getElementById('c_id').textContent=c.id;
  document.getElementById('c_tag').textContent=c.tag;
  document.getElementById('c_level').textContent=c.level;
  document.getElementById('c_xp').textContent=c.xp;
  document.getElementById('c_plays').textContent=c.plays;
  document.getElementById('c_last').textContent=c.last;
  document.getElementById('c_online').textContent=diff+' days ago';
  document.getElementById('c_desc').textContent=c.desc;
  document.getElementById('c_leader').textContent='';
  document.getElementById('clanModal').style.display='block';
}

function closeModal(id){
  document.getElementById(id).style.display='none';
}

load();
</script>

</body>
</html>
