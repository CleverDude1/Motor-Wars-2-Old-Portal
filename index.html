<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Motor Wars 2 Original | Players</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    th { cursor: pointer; }

    th[data-sort]::after {
      content: ' ⇅';
      font-size: 0.7em;
      color: #999;
      margin-left: 4px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.8);
      color: #e5e7eb;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .modal-content {
      background: linear-gradient(#14240e, #0f1f0b);
      margin: 10% auto;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      position: relative;
    }

    .close {
      position: absolute;
      right: 15px;
      top: 10px;
      color: #84cc16;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }

    tbody tr {
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <h2>Motor Wars 2 Original</h2>

    <div class="category">
      <h3>Search & Analyze</h3>
      <button class="side-btn active" id="btnAllPlayers">Players</button>
      <button class="side-btn sub" id="btnActivePlayers">Active Players</button>
      <button class="side-btn sub" onclick="window.location.href='player_tracker.html'">Player Tracker</button>
      <button class="side-btn" id="btnClans">Clans</button>
    </div>

    <div class="category">
      <h3>Scores & Ranking</h3>
      <button class="side-btn" onclick="window.location.href='nostalgia_night.html'">Nostalgia Night</button>
    </div>

    <div class="category">
      <h3>Analytics</h3>
      <button class="side-btn" onclick="window.location.href='statistics.html'">Statistics</button>
      <button class="side-btn" onclick="window.location.href='xp_calculator.html'">XP Calculator</button>
    </div>
  </aside>

  <main class="main">

    <div class="top-bar">
      <input type="text" id="searchInput" placeholder="Search for a player..." />
      <button class="search-btn" id="btnSearchPlayer">Search Player</button>
    </div>

    <!-- PLAYER TABLE -->
    <div class="table-wrapper" id="playersSection">
      <table>
        <thead>
          <tr>
            <th data-sort="index">#</th>
            <th data-sort="country">Country</th>
            <th data-sort="username">Player</th>
            <th data-sort="level">Level</th>
            <th data-sort="xp">Xp</th>
            <th data-sort="join_date">Join Date</th>
            <th data-sort="last_online">Last Online</th>
            <th data-sort="clan">Clan</th>
          </tr>
        </thead>
        <tbody id="playerTableBody">
          <tr><td colspan="8">Loading players...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- CLANS TABLE -->
    <div class="table-wrapper" id="clansSection" style="display:none;">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Clan Tag</th>
            <th>Clan Name</th>
            <th>Level</th>
            <th>Honor</th>
            <th>Members (plays)</th>
            <th>Last Active</th>
          </tr>
        </thead>
        <tbody id="clansTableBody">
          <tr><td colspan="7">Loading clans...</td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script>
const API_URL = 'https://raw.githubusercontent.com/CleverDude1/Motor-Wars-2-Old-Portal/refs/heads/main/players.json';
const CLANS_API = 'https://mw2-proxy-clans.vercel.app/api/clans';

let cachedPlayers = [];
let cachedClans = [];

const btnClans = document.getElementById('btnClans');
const playersSection = document.getElementById('playersSection');
const clansSection = document.getElementById('clansSection');

function xpToLevel(xp) {
  return Math.max(1, Math.floor(Math.sqrt(Math.max(0, xp)/2500)));
}

function mapPlayerData(player) {
  const p = player.current || {};

  let username = p.nickname || 'Unknown';
  let clan = '-';

  const match = username.match(/\(([^)]+)\)/);
  if (match) {
    clan = match[1];
    username = username.replace(/\s*\([^)]+\)/, '');
  }

  return {
    id: p.id || 'N/A',
    country: p.country || 'N/A',
    username,
    xp: Number(p.xp) || 0,
    level: xpToLevel(p.xp || 0),
    join_date: p.timeJoined || 'N/A',
    last_online: p.lastLogin || 'N/A',
    clan
  };
}

async function loadPlayers() {
  const res = await fetch(API_URL);
  const data = await res.json();
  cachedPlayers = data;
  renderPlayers(data);
}

function renderPlayers(players) {
  const tbody = document.getElementById('playerTableBody');
  tbody.innerHTML = '';

  players.map(mapPlayerData).forEach((p, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${p.country}</td>
      <td>${p.username}</td>
      <td>${p.level}</td>
      <td>${p.xp}</td>
      <td>${p.join_date}</td>
      <td>${p.last_online}</td>
      <td>${p.clan}</td>
    `;
    tbody.appendChild(tr);
  });
}

/* =========================
   CLANS SECTION
========================= */

async function loadClans() {
  const res = await fetch(CLANS_API);
  const data = await res.json();
  cachedClans = data;
  renderClans(data);
}

function renderClans(clans) {
  const tbody = document.getElementById('clansTableBody');
  tbody.innerHTML = '';

  clans.forEach((c, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${c.clanTag}</td>
      <td>${c.clanName || '-'}</td>
      <td>${c.level}</td>
      <td>${c.honor}</td>
      <td>${c.plays}</td>
      <td>${c.lastActive}</td>
    `;
    tbody.appendChild(tr);
  });
}

/* =========================
   SWITCH TABS
========================= */

btnClans.addEventListener('click', () => {
  playersSection.style.display = 'none';
  clansSection.style.display = 'block';
  loadClans();
});

/* ========================= */

window.addEventListener('DOMContentLoaded', loadPlayers);
</script>

</body>
</html>
